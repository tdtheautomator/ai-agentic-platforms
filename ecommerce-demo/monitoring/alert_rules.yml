groups:
  - name: ecommerce_demo_alerts
    interval: 30s
    rules:
      # ── Transaction Alerts (Every Pipeline Run) ────────────────────────────
      - alert: TransactionProcessed
        expr: increase(ecommerce_pipeline_runs_total[1m]) > 0
        for: 0s
        labels:
          severity: info
          type: transaction
          status: processed
        annotations:
          summary: "Order processed"
          description: "Order pipeline has been executed"

      # ── Application Availability ──────────────────────────────────────────
      - alert: EcommerceDemoDown
        expr: up{job="ecommerce-demo"} == 0
        for: 1m
        labels:
          severity: critical
          service: ecommerce-demo
        annotations:
          summary: "E-Commerce Demo service is down"
          description: "E-Commerce Demo has been unreachable for more than 1 minute"
          dashboard: "http://grafana:3000/d/ecommerce-demo"

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="ecommerce-demo",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="ecommerce-demo"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          dashboard: "http://grafana:3000/d/ecommerce-demo"

      # ── Pipeline Performance ──────────────────────────────────────────────
      - alert: SlowPipelineExecution
        expr: |
          histogram_quantile(0.95, rate(ecommerce_agent_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "Slow pipeline execution detected"
          description: "P95 agent latency is {{ $value | humanizeDuration }} (threshold: 30s)"
          dashboard: "http://grafana:3000/d/ecommerce-pipeline"

      - alert: PipelineStalled
        expr: |
          increase(ecommerce_pipeline_runs_total[5m]) == 0
        for: 10m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "Pipeline execution stalled"
          description: "No pipeline runs detected in the last 5 minutes"
          dashboard: "http://grafana:3000/d/ecommerce-pipeline"

      # ── Order Processing ──────────────────────────────────────────────────
      - alert: HighCancelledOrderRate
        expr: |
          (
            sum(rate(ecommerce_pipeline_runs_total{outcome="cancelled"}[5m]))
            /
            sum(rate(ecommerce_pipeline_runs_total[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "High order cancellation rate"
          description: "{{ $value | humanizePercentage }} of orders are being cancelled (threshold: 20%)"
          dashboard: "http://grafana:3000/d/ecommerce-orders"

      - alert: FraudDetectionHigh
        expr: |
          increase(ecommerce_fraud_detections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "High fraud detection rate"
          description: "{{ $value }} fraud alerts detected in the last 5 minutes"
          dashboard: "http://grafana:3000/d/ecommerce-fraud"

      # ── Memory Management ─────────────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: |
          (
            container_memory_usage_bytes{name="agent-ecommerce-demo"}
            /
            container_spec_memory_limit_bytes{name="agent-ecommerce-demo"}
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "High memory usage detected"
          description: "E-Commerce Demo is using {{ $value | humanizePercentage }} of allocated memory"
          dashboard: "http://grafana:3000/d/ecommerce-infrastructure"

      # ── LLM Backend ───────────────────────────────────────────────────────
      - alert: LLMHighLatency
        expr: |
          histogram_quantile(0.95, rate(ecommerce_llm_latency_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "LLM response latency is high"
          description: "P95 LLM latency is {{ $value | humanizeDuration }} (threshold: 10s)"
          dashboard: "http://grafana:3000/d/ecommerce-llm"

      - alert: LLMErrorRate
        expr: |
          (
            sum(rate(ecommerce_llm_requests_total{status="error"}[5m]))
            /
            sum(rate(ecommerce_llm_requests_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: ecommerce-demo
        annotations:
          summary: "LLM error rate is high"
          description: "LLM error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
          dashboard: "http://grafana:3000/d/ecommerce-llm"
